<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FutureSightML - Pokemon Team Builder</title>
    <link rel="icon" type="image/x-icon" href="/static/icon.ico" />
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* === RETRO COLOR SYSTEM (dual-mode) === */
        :root {
            --retro-bg: #e8e0c8;
            --retro-surface: #f0ead8;
            --retro-surface-alt: #d8d0b8;
            --retro-border: #383830;
            --retro-border-light: #58584e;
            --retro-text: #181810;
            --retro-accent: #c02820;
            --retro-accent2: #2858a0;
            --retro-gold: #b8960c;
        }
        .dark {
            --retro-bg: #0c0c1e;
            --retro-surface: #18182e;
            --retro-surface-alt: #242442;
            --retro-border: #5a5a8a;
            --retro-border-light: #44446a;
            --retro-text: #e8e8f0;
            --retro-accent: #e63946;
            --retro-accent2: #5890c8;
            --retro-gold: #f4d35e;
        }

        /* === GLOBAL BASE === */
        body {
            background: var(--retro-bg);
            color: var(--retro-text);
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            line-height: 1.8;
        }
        .pixel-font { font-family: 'Press Start 2P', monospace; }

        /* === RETRO PANEL (replaces .glass) === */
        .retro-panel {
            background: var(--retro-surface);
            border: 3px solid var(--retro-border);
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.05);
        }
        .retro-panel-header {
            background: var(--retro-border);
            color: #fff;
            padding: 4px 8px;
            margin: -1px -1px 8px -1px;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* === POKEMON CARD === */
        .pokemon-card { transition: none; }
        .pokemon-card:hover { transform: translateY(-2px); box-shadow: 3px 3px 0 var(--retro-border); }
        .sprite-container { image-rendering: pixelated; }

        /* === TYPE BADGE === */
        .type-badge {
            padding: 2px 6px;
            border-radius: 0;
            font-size: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 2px solid rgba(0,0,0,0.3);
        }

        /* === STAT BAR (HP bar look) === */
        .stat-bar {
            height: 8px;
            border-radius: 0;
            transition: width 0.3s steps(8);
            background-image: repeating-linear-gradient(90deg, transparent, transparent 7px, rgba(0,0,0,0.2) 7px, rgba(0,0,0,0.2) 8px);
            background-size: 100% 100%;
        }

        /* === GLOW (retro thick border) === */
        .glow { box-shadow: none; border: 3px solid var(--retro-accent) !important; }

        /* === PROGRESS BAR === */
        .progress-bar { background: var(--retro-accent); border-radius: 0; }

        /* === POKEBALL SPINNER (blinking arrow) === */
        .pokeball-spinner {
            width: auto !important;
            height: auto !important;
            border: none !important;
            border-radius: 0 !important;
            background: transparent !important;
            animation: blink 0.6s steps(2) infinite !important;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: var(--retro-accent);
            display: inline-block;
        }
        .pokeball-spinner::after { content: '\25B6'; }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--retro-bg); }
        ::-webkit-scrollbar-thumb { background: var(--retro-border); border-radius: 0; }

        /* === ANIMATIONS (stepped for retro feel) === */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.2s steps(3) forwards; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .animate-pulse { animation: pulse 1s steps(2) infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* === GLOBAL OVERRIDES === */
        /* Auto-border nested panels */
        [class*="bg-dark-700"] { border: 2px solid var(--retro-border); }

        /* Retro form inputs */
        input, textarea, select {
            border: 2px solid var(--retro-border) !important;
            background: var(--retro-surface-alt) !important;
            color: var(--retro-text) !important;
            font-family: 'Press Start 2P', monospace !important;
            font-size: 9px !important;
            border-radius: 0 !important;
        }

        /* Instant transitions (retro snappiness) */
        .transition-colors, .transition-opacity { transition-duration: 0s !important; }

        /* Hard pixel drop-shadow on shadow-lg elements */
        [class*="shadow-lg"] { box-shadow: 3px 3px 0 var(--retro-border) !important; }

        /* Arrow selector on active nav button */
        nav button[class*="bg-accent"]::before { content: '\25B6 '; font-size: 8px; }

        /* Buttons get retro border */
        button { border-radius: 0; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: 'var(--retro-bg)',
                            800: 'var(--retro-surface)',
                            700: 'var(--retro-surface-alt)',
                            600: 'var(--retro-border)',
                        },
                        accent: 'var(--retro-accent)',
                        accent2: 'var(--retro-accent2)',
                        gold: 'var(--retro-gold)',
                    },
                    borderRadius: {
                        DEFAULT: '0px', none: '0px', sm: '0px', md: '0px',
                        lg: '0px', xl: '0px', '2xl': '0px', full: '0px',
                    },
                    fontFamily: {
                        sans: ['"Press Start 2P"', 'monospace'],
                        mono: ['"Press Start 2P"', 'monospace'],
                    },
                    fontSize: {
                        'xs': ['8px', { lineHeight: '1.8' }],
                        'sm': ['9px', { lineHeight: '1.8' }],
                        'base': ['10px', { lineHeight: '1.8' }],
                        'lg': ['11px', { lineHeight: '1.8' }],
                        'xl': ['12px', { lineHeight: '1.6' }],
                        '2xl': ['14px', { lineHeight: '1.6' }],
                        '3xl': ['18px', { lineHeight: '1.4' }],
                    },
                }
            }
        };
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
const { useState, useEffect, useCallback, useRef } = React;

const API = window.location.origin + '/api';

const TYPE_COLORS = {
    Normal:'#A8A878',Fire:'#F08030',Water:'#6890F0',Electric:'#F8D030',Grass:'#78C850',
    Ice:'#98D8D8',Fighting:'#C03028',Poison:'#A040A0',Ground:'#E0C068',Flying:'#A890F0',
    Psychic:'#F85888',Bug:'#A8B820',Rock:'#B8A038',Ghost:'#705898',Dragon:'#7038F8',
    Dark:'#705848',Steel:'#B8B8D0',Fairy:'#EE99AC',
};

function TypeBadge({ type }) {
    const bg = TYPE_COLORS[type] || '#888';
    return <span className="type-badge text-white" style={{ background: bg }}>{type}</span>;
}

function StatBar({ label, value, max = 255 }) {
    const pct = Math.min((value / max) * 100, 100);
    const color = value >= 120 ? '#4ade80' : value >= 80 ? '#fbbf24' : value >= 50 ? '#fb923c' : '#f87171';
    return (
        <div className="flex items-center gap-2 text-xs">
            <span className="w-8 text-gray-400">{label}</span>
            <div className="flex-1 bg-dark-700 h-3">
                <div className="stat-bar" style={{ width: `${pct}%`, background: color }} />
            </div>
            <span className="w-8 text-right font-mono">{value}</span>
        </div>
    );
}

function spriteId(species) {
    let name = (species || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    const noSplit = new Set([
        'regice','regirock','registeel','regieleki','regidrago',
        'glastrier','spectrier','froslass','snorunt','avalugg',
        'dewgong','sealeo','walrein','beartic','crabominable',
        'sandshrew','sandslash','geodude','graveler','golem',
        'hippopotas','hippowdon','palossand','sandaconda',
        'marowak','cubone','donphan','flygon','krookodile',
        'gastrodon','shellos','quagsire','swampert','whiscash',
        'politoed','poliwrath','golduck','starmie','cloyster',
        'lanturn','wishiwashi','araquanid','dracovish',
        'electrode','magneton','magnezone','electivire',
        'jolteon','luxray','manectric','rotomheat','rotomwash',
        'rotomfrost','rotomfan','rotommow',
        'heatran','magcargo','torkoal','chandelure','volcarona',
        'darmanitan','blaziken','infernape','arcanine',
        'breloom','abomasnow','ferrothorn','tangrowth',
        'exeggutor','leafeon','roserade','venusaur',
        'umbreon','absol','bisharp','pangoro','incineroar',
        'tyranitar','hydreigon','darkrai','zarude',
        'lucario','machamp','conkeldurr','sirfetchd',
        'toxicroak','salazzle','nihilego','naganadel',
        'metagross','scizor','ferrothorn','excadrill',
        'gardevoir','alakazam','espeon','reuniclus',
        'aerodactyl','lycanroc','tyrantrum','archeops',
        'drifblim','gengar','chandelure','mimikyu',
        'dragonite','salamence','garchomp','goodra',
        'clefable','sylveon','primarina','tapulele',
    ]);
    if (noSplit.has(name)) return name;
    const suffixes = [
        'alola','galar','hisui','paldea',
        'megax','megay','mega',
        'primal','origin','therian','incarnate',
        'ice','shadow','rapid','single','crowned',
        'heat','wash','frost','fan','mow',
        'sky','land','trash','sandy',
        'attack','defense','speed',
        'bloodmoon','wellspring','hearthflame','cornerstone',
        'stellar','terastal',
        'bug','dark','dragon','electric','fairy','fighting','fire',
        'flying','ghost','grass','ground','poison',
        'psychic','rock','steel','water',
    ];
    for (const s of suffixes) {
        if (name.endsWith(s) && name.length > s.length) {
            name = name.slice(0, -s.length) + '-' + s;
            break;
        }
    }
    return name;
}

function PokemonSprite({ species, size = 96, animated = false }) {
    const name = spriteId(species);
    const spriteUrl = (n, anim) => anim
        ? `https://play.pokemonshowdown.com/sprites/ani/${n}.gif`
        : `https://play.pokemonshowdown.com/sprites/gen5/${n}.png`;
    const [src, setSrc] = useState(() => name ? spriteUrl(name, animated) : '');
    const [error, setError] = useState(false);

    useEffect(() => {
        if (name) {
            setError(false);
            setSrc(spriteUrl(name, animated));
        }
    }, [name, animated]);

    if (error || !name || !src) {
        return <div className="flex items-center justify-center bg-dark-700 rounded-lg" style={{ width: size, height: size }}>
            <span className="text-2xl">?</span>
        </div>;
    }

    return <img src={src} alt={species} className="sprite-container"
                style={{ width: size, height: size, objectFit: 'contain' }}
                onError={() => {
                    if (src.includes('/ani/')) setSrc(`https://play.pokemonshowdown.com/sprites/gen5/${name}.png`);
                    else if (src.includes('/gen5/')) setSrc(`https://play.pokemonshowdown.com/sprites/ani/${name}.gif`);
                    else setError(true);
                }} />;
}

function PokemonCard({ pokemon, onClick, selected, compact }) {
    if (compact) {
        return (
            <div onClick={onClick}
                 className={`pokemon-card flex items-center gap-3 p-2 rounded-lg cursor-pointer ${selected ? 'retro-panel glow' : 'bg-dark-700 hover:bg-dark-600'}`}>
                <PokemonSprite species={pokemon.species} size={40} />
                <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm truncate">{pokemon.species || pokemon.name}</div>
                    <div className="flex gap-1 mt-0.5">
                        {(pokemon.types || []).map(t => <TypeBadge key={t} type={t} />)}
                    </div>
                </div>
            </div>
        );
    }

    return (
        <div onClick={onClick}
             className={`pokemon-card retro-panel rounded-xl p-4 cursor-pointer ${selected ? 'glow border-accent' : ''}`}>
            <div className="flex items-center gap-3 mb-3">
                <PokemonSprite species={pokemon.species} size={64} animated />
                <div>
                    <h3 className="font-bold text-lg">{pokemon.species}</h3>
                    <div className="flex gap-1 mt-1">
                        {(pokemon.types || []).map(t => <TypeBadge key={t} type={t} />)}
                    </div>
                </div>
            </div>
            {pokemon.ability && <div className="text-xs text-gray-400 mb-1">Ability: <span className="text-gray-200">{pokemon.ability}</span></div>}
            {pokemon.item && <div className="text-xs text-gray-400 mb-1">Item: <span className="text-gray-200">{pokemon.item}</span></div>}
            {pokemon.tera_type && <div className="text-xs text-gray-400 mb-1">Tera: <span className="text-gray-200">{pokemon.tera_type}</span></div>}
            {pokemon.nature && <div className="text-xs text-gray-400 mb-1">Nature: <span className="text-accent font-semibold">{pokemon.nature}</span></div>}
            {(() => { const ev = formatEVs && formatEVs(pokemon.evs); return ev ? <div className="text-xs text-gray-400 mb-1">EVs: <span className="text-gray-200">{ev}</span></div> : null; })()}
            {(() => { const iv = formatIVs && formatIVs(pokemon.ivs); return iv ? <div className="text-xs text-yellow-400/80 mb-1">IVs: <span>{iv}</span></div> : null; })()}
            {pokemon.moves && pokemon.moves.length > 0 && (
                <div className="grid grid-cols-2 gap-1 mt-2">
                    {pokemon.moves.map((m, i) => (
                        <div key={i} className="text-xs bg-dark-700 rounded px-2 py-1 text-center truncate">{m}</div>
                    ))}
                </div>
            )}
            {pokemon.baseStats && (
                <div className="mt-3 space-y-1">
                    {Object.entries(pokemon.baseStats).map(([k, v]) => (
                        <StatBar key={k} label={k.toUpperCase().slice(0,3)} value={v} />
                    ))}
                </div>
            )}
        </div>
    );
}

function formatEVs(evs) {
    if (!evs || typeof evs !== 'object') return null;
    const parts = [];
    const order = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
    const labels = { hp: 'HP', atk: 'Atk', def: 'Def', spa: 'SpA', spd: 'SpD', spe: 'Spe' };
    for (const stat of order) {
        const val = evs[stat];
        if (val && val > 0) parts.push(`${val} ${labels[stat]}`);
    }
    return parts.length > 0 ? parts.join(' / ') : null;
}

function formatIVs(ivs) {
    if (!ivs || typeof ivs !== 'object') return null;
    const parts = [];
    const labels = { hp: 'HP', atk: 'Atk', def: 'Def', spa: 'SpA', spd: 'SpD', spe: 'Spe' };
    for (const [stat, val] of Object.entries(ivs)) {
        if (val !== undefined && val !== null && val !== 31) {
            parts.push(`${val} ${labels[stat] || stat}`);
        }
    }
    return parts.length > 0 ? parts.join(' / ') : null;
}

function TeamSlot({ pokemon, index, onRemove, gen, onClick, isSelected, team, format, onReplace }) {
    if (!pokemon) {
        return (
            <div className="retro-panel rounded-xl p-4 flex items-center justify-center h-28 border-2 border-dashed border-dark-600">
                <span className="text-gray-500 text-sm">Slot {index + 1}</span>
            </div>
        );
    }

    const g = gen || 9;
    const evStr = g >= 3 ? formatEVs(pokemon.evs) : null;
    const ivStr = g >= 3 ? formatIVs(pokemon.ivs) : null;

    return (
        <div className={`retro-panel rounded-xl p-3 relative group fade-in cursor-pointer ${isSelected ? 'glow' : ''}`}
             onClick={() => onClick && onClick(index)}>
            <div className="absolute -top-2 right-6 flex gap-1 opacity-0 group-hover:opacity-100">
                {team && onReplace && <SlotSuggestionBtn team={team} slotIdx={index} format={format} onReplace={(s) => onReplace(index, s)} />}
            </div>
            <button onClick={(e) => { e.stopPropagation(); onRemove(index); }}
                    className="absolute -top-2 -right-2 w-6 h-6 bg-red-600 border-2 border-red-900 text-xs font-bold opacity-0 group-hover:opacity-100 flex items-center justify-center">
                X
            </button>
            <div className="flex items-center gap-2">
                <PokemonSprite species={pokemon.species} size={48} animated />
                <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm truncate">{pokemon.species}</div>
                    {g >= 2 && pokemon.item && <div className="text-xs text-gray-400 truncate">@ {pokemon.item}</div>}
                    {g >= 3 && pokemon.ability && <div className="text-xs text-gray-500 truncate">{pokemon.ability}</div>}
                </div>
            </div>
            {g >= 3 && pokemon.nature && <div className="text-[10px] text-accent mt-1">{pokemon.nature} Nature</div>}
            {evStr && <div className="text-[10px] text-gray-400 mt-0.5">EVs: {evStr}</div>}
            {ivStr && <div className="text-[10px] text-yellow-400/70 mt-0.5">IVs: {ivStr}</div>}
            {g >= 9 && pokemon.tera_type && <div className="text-[10px] text-purple-400 mt-0.5">Tera: {pokemon.tera_type}</div>}
            {pokemon.moves && (
                <div className="grid grid-cols-2 gap-0.5 mt-2">
                    {pokemon.moves.map((m, i) => (
                        <div key={i} className="text-[10px] bg-dark-700 rounded px-1 py-0.5 text-center truncate text-gray-300">{m}</div>
                    ))}
                </div>
            )}
        </div>
    );
}

function GeneratePanel({ format, onTeamGenerated, onError }) {
    const [loading, setLoading] = useState(false);
    const [progress, setProgress] = useState('');
    const [settings, setSettings] = useState({ population: 100, generations: 80, n_results: 5 });

    async function generate() {
        setLoading(true);
        setProgress('Evolving teams...');
        try {
            const res = await fetch(`${API}/team/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ format_id: format, ...settings }),
            });
            if (!res.ok) {
                const errText = await res.text();
                let errMsg = errText;
                try { errMsg = JSON.parse(errText).detail || errText; } catch {}
                throw new Error(errMsg);
            }
            const data = await res.json();
            onTeamGenerated(data.teams);
            setProgress(`Generated ${data.teams.length} teams!`);
        } catch (e) {
            setProgress(`Error: ${e.message}`);
            if (onError) onError(e.message);
        }
        setLoading(false);
    }

    return (
        <div className="retro-panel rounded-xl p-4">
            <div className="retro-panel-header flex items-center gap-2">
                <span className="text-accent">AI</span> Team Generator
            </div>
            <p className="text-[10px] text-gray-500 mb-3">Uses a genetic algorithm to evolve teams that maximize predicted win rate against the current metagame.</p>
            <div className="grid grid-cols-3 gap-3 mb-3">
                <div>
                    <label className="text-xs text-gray-400 block mb-1" title="Number of candidate teams evolved simultaneously. Higher = more diverse exploration but slower.">Population</label>
                    <input type="number" value={settings.population}
                           onChange={e => setSettings({...settings, population: +e.target.value})}
                           className="w-full bg-dark-700 rounded px-2 py-1 text-sm" />
                    <span className="text-[9px] text-gray-600 block mt-0.5">Candidate teams per cycle</span>
                </div>
                <div>
                    <label className="text-xs text-gray-400 block mb-1" title="Number of evolution cycles. Each generation mutates, crosses, and selects the fittest teams. More = better results.">Generations</label>
                    <input type="number" value={settings.generations}
                           onChange={e => setSettings({...settings, generations: +e.target.value})}
                           className="w-full bg-dark-700 rounded px-2 py-1 text-sm" />
                    <span className="text-[9px] text-gray-600 block mt-0.5">Evolution cycles to run</span>
                </div>
                <div>
                    <label className="text-xs text-gray-400 block mb-1" title="How many top-performing teams to return from the final population."># Teams</label>
                    <input type="number" value={settings.n_results}
                           onChange={e => setSettings({...settings, n_results: +e.target.value})}
                           className="w-full bg-dark-700 rounded px-2 py-1 text-sm" />
                    <span className="text-[9px] text-gray-600 block mt-0.5">Best teams to return</span>
                </div>
            </div>
            <button onClick={generate} disabled={loading}
                    className="w-full bg-accent hover:bg-red-700 disabled:bg-gray-600 text-white font-bold py-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                {loading ? <><div className="pokeball-spinner" style={{width:20,height:20,borderWidth:2}} /> Generating...</>
                         : 'Generate Optimal Teams'}
            </button>
            {progress && <p className="text-xs text-gray-400 mt-2 text-center">{progress}</p>}
        </div>
    );
}

function ImportExportPanel({ team, format, onImport }) {
    const [paste, setPaste] = useState('');
    const [exportText, setExportText] = useState('');
    const [mode, setMode] = useState('import');

    async function handleImport() {
        try {
            const res = await fetch(`${API}/team/import`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ format_id: format, paste }),
            });
            const data = await res.json();
            if (data.team) onImport(data.team);
        } catch (e) {
            showNotification('Import failed: ' + e.message, 'error');
        }
    }

    async function handleExport() {
        try {
            const res = await fetch(`${API}/team/export`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ team }),
            });
            const data = await res.json();
            setExportText(data.paste);
            setMode('export');
        } catch (e) {
            showNotification('Export failed: ' + e.message, 'error');
        }
    }

    return (
        <div className="retro-panel rounded-xl p-4">
            <div className="flex gap-2 mb-3">
                <button onClick={() => setMode('import')}
                        className={`px-3 py-1 rounded text-sm font-semibold ${mode === 'import' ? 'bg-accent text-white' : 'bg-dark-700 text-gray-400'}`}>Import</button>
                <button onClick={() => { setMode('export'); handleExport(); }}
                        className={`px-3 py-1 rounded text-sm font-semibold ${mode === 'export' ? 'bg-accent text-white' : 'bg-dark-700 text-gray-400'}`}>Export</button>
            </div>
            {mode === 'import' ? (
                <>
                    <textarea value={paste} onChange={e => setPaste(e.target.value)}
                              placeholder="Paste your Showdown team here..."
                              className="w-full bg-dark-700 rounded p-2 text-xs font-mono h-32 resize-none" />
                    <button onClick={handleImport} className="mt-2 w-full bg-accent2 hover:bg-blue-700 text-white py-1.5 rounded text-sm font-semibold">
                        Import Team
                    </button>
                </>
            ) : (
                <>
                    <textarea value={exportText} readOnly
                              className="w-full bg-dark-700 rounded p-2 text-xs font-mono h-32 resize-none" />
                    <button onClick={() => { navigator.clipboard.writeText(exportText); }}
                            className="mt-2 w-full bg-accent2 hover:bg-blue-700 text-white py-1.5 rounded text-sm font-semibold">
                        Copy to Clipboard
                    </button>
                </>
            )}
        </div>
    );
}

function EvaluationPanel({ team, format, onEvaluated }) {
    const [evaluation, setEvaluation] = useState(null);
    const [loading, setLoading] = useState(false);

    async function evaluate() {
        if (team.filter(Boolean).length === 0) return;
        setLoading(true);
        try {
            const res = await fetch(`${API}/team/evaluate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ format_id: format, team: team.filter(Boolean) }),
            });
            const data = await res.json();
            setEvaluation(data);
            if (onEvaluated) onEvaluated(data.overall_winrate);
        } catch (e) {
            console.error(e);
        }
        setLoading(false);
    }

    useEffect(() => {
        const filled = team.filter(Boolean);
        if (filled.length >= 1) evaluate();
    }, [team]);

    if (!evaluation) return null;

    const wr = evaluation.overall_winrate;
    const wrColor = wr >= 55 ? 'text-green-400' : wr >= 45 ? 'text-yellow-400' : 'text-red-400';

    return (
        <div className="retro-panel rounded-xl p-4 fade-in">
            <h3 className="font-bold mb-2">Team Evaluation</h3>
            <div className="flex justify-around mb-3">
                <div className="text-center">
                    <div className={`text-3xl font-bold ${wrColor}`}>{wr}%</div>
                    <div className="text-xs text-gray-400">Predicted Win Rate</div>
                </div>
                <div className="text-center">
                    <div className="text-3xl font-bold text-blue-400">{evaluation.matchups_above_50}/{evaluation.total_matchups}</div>
                    <div className="text-xs text-gray-400">Matchup Spread</div>
                </div>
            </div>
            <div className="w-full bg-dark-700 h-3 mb-3">
                <div className="progress-bar h-3" style={{ width: `${wr}%` }} />
            </div>
            {evaluation.worst_matchups && evaluation.worst_matchups.length > 0 && (
                <div className="mt-2">
                    <div className="text-xs text-gray-500 mb-1">Worst matchups:</div>
                    {evaluation.worst_matchups.slice(0, 3).map((m, i) => (
                        <div key={i} className="flex items-center justify-between text-xs py-1">
                            <span className="text-gray-300 truncate">{m.opponent.join(', ')}</span>
                            <span className={m.win_prob < 45 ? 'text-red-400' : 'text-yellow-400'}>{m.win_prob}%</span>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
}

function AnalysisPanel({ team, format, autoRun, onAnalysisResult }) {
    const [analysis, setAnalysis] = useState(null);
    const [loading, setLoading] = useState(false);
    const [expanded, setExpanded] = useState(false);
    const [error, setError] = useState(null);
    const panelRef = useRef(null);
    const hasAutoRun = useRef(false);

    async function runAnalysis() {
        if (team.filter(Boolean).length === 0) return;
        setLoading(true);
        setError(null);
        try {
            const res = await fetch(`${API}/team/analyze/full`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ format_id: format, team: team.filter(Boolean) }),
            });
            if (!res.ok) throw new Error(`Analysis failed (${res.status})`);
            const data = await res.json();
            setAnalysis(data);
            setExpanded(true);
            if (onAnalysisResult) onAnalysisResult(data);
            setTimeout(() => {
                if (panelRef.current) panelRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        } catch (e) {
            console.error(e);
            setError(e.message);
        }
        setLoading(false);
    }

    // Auto-run analysis when triggered by team generation
    useEffect(() => {
        if (autoRun && team.filter(Boolean).length > 0 && !hasAutoRun.current) {
            hasAutoRun.current = true;
            runAnalysis();
        }
        if (!autoRun) hasAutoRun.current = false;
    }, [autoRun, team]);

    return (
        <div ref={panelRef} className={`retro-panel rounded-xl p-4 ${analysis ? 'border-accent2' : ''}`}>
            <button onClick={runAnalysis} disabled={loading || team.filter(Boolean).length === 0}

function MetaPage({ format, onLoadTeam }) {
    const [meta, setMeta] = useState(null);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        async function load() {
            try {
                const res = await fetch(`${API}/meta/${format}`);
                const data = await res.json();
                setMeta(data);
            } catch (e) { console.error(e); }
            setLoading(false);
        }
        load();
    }, [format]);

    function detectArchetype(pokemon) {
        const species = pokemon.map(s => (s || '').toLowerCase());
        const all = species.join(' ');
        if (['stealthrock','spikes','toxicspikes'].some(h => all.includes(h))) return 'Balance';
        return 'Offense';
    }

    async function handleCopy(team) {
        const teamData = team.pokemon.map(sp => ({species: sp, moves: [], ability: '', item: ''}));
        try {
            const res = await fetch(`${API}/team/export`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ team: teamData }),
            });
            const data = await res.json();
            await navigator.clipboard.writeText(data.paste || '');
        } catch {}
    }

    function handleLoad(team) {
        if (onLoadTeam) {
            const teamData = team.pokemon.map(sp => ({species: sp, moves: [], ability: '', item: ''}));
            onLoadTeam(teamData);
        }
    }

    if (loading) return <div className="flex items-center justify-center py-20"><div className="pokeball-spinner" /></div>;
    if (!meta) return <div className="text-center text-gray-400 py-10">No meta data available</div>;

    return (
        <div className="space-y-6 fade-in">
            <div className="retro-panel rounded-xl p-4">
                <h3 className="font-bold text-lg mb-1">Metagame Overview</h3>
                <div className="text-sm text-gray-400">{meta.pool_size} Pokemon sets | {meta.total_meta_teams} meta teams</div>
            </div>

            <div className="retro-panel rounded-xl p-4">
                <h3 className="font-bold mb-3">Top Pokemon</h3>
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                    {meta.top_pokemon.slice(0, 20).map((p, i) => (
                        <div key={i} className="flex items-center gap-2 bg-dark-700 rounded-lg p-2">
                            <span className="text-xs text-gray-500 w-5">#{i+1}</span>
                            <PokemonSprite species={p.species} size={40} />
                            <div className="min-w-0">
                                <div className="text-sm font-semibold truncate">{p.species}</div>
                                <div className="text-xs text-gray-500">{p.sets} sets</div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>

            <div className="retro-panel rounded-xl p-4">
                <h3 className="font-bold mb-3">Sample Meta Teams</h3>
                <div className="space-y-3">
                    {meta.meta_teams.map((team, i) => (
                        <div key={i} className="flex items-center gap-1 bg-dark-700 rounded-lg p-2">
                            <span className="text-xs text-gray-500 w-8">#{i+1}</span>
                            {team.pokemon.map((sp, j) => (
                                <div key={j} className="flex flex-col items-center">
                                    <PokemonSprite species={sp} size={40} />
                                    <span className="text-[9px] text-gray-500 truncate w-12 text-center">{sp}</span>
                                </div>
                            ))}
                            <div className="flex gap-1 ml-auto flex-shrink-0">
                                <button onClick={() => handleLoad(team)}
                                        className="text-[9px] px-2 py-0.5 bg-accent2 text-white font-bold hover:bg-blue-700">LOAD</button>
                                <button onClick={() => handleCopy(team)}
                                        className="text-[9px] px-2 py-0.5 bg-dark-600 text-white font-bold hover:bg-dark-700">COPY</button>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
}

function SavedTeamsPanel({ format, onLoad, version, onCompare }) {
    const [saved, setSaved] = useState([]);
    const [expanded, setExpanded] = useState(false);
    const [compareMode, setCompareMode] = useState(false);
    const [selected, setSelected] = useState([]);

    useEffect(() => {
        loadSaved();
    }, [format, version]);

    function loadSaved() {
        try {
            const all = JSON.parse(localStorage.getItem('fsml-saved-teams') || '[]');
            setSaved(all.filter(s => s.format === format));
        } catch { setSaved([]); }
    }

    function deleteTeam(id) {
        try {
            const all = JSON.parse(localStorage.getItem('fsml-saved-teams') || '[]');
            const filtered = all.filter(s => s.id !== id);
            localStorage.setItem('fsml-saved-teams', JSON.stringify(filtered));
            setSaved(filtered.filter(s => s.format === format));
        } catch {}
    }

    function renameTeam(id, newName) {
        try {
            const all = JSON.parse(localStorage.getItem('fsml-saved-teams') || '[]');
            const entry = all.find(s => s.id === id);
            if (entry) entry.name = newName;
            localStorage.setItem('fsml-saved-teams', JSON.stringify(all));
            setSaved(all.filter(s => s.format === format));
        } catch {}
    }

    function toggleSelect(id) {
        setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : prev.length < 2 ? [...prev, id] : prev);
    }

    function doCompare() {
        if (selected.length !== 2 || !onCompare) return;
        const t1 = saved.find(s => s.id === selected[0]);
        const t2 = saved.find(s => s.id === selected[1]);
        if (t1 && t2) onCompare(t1.pokemon, t2.pokemon);
        setCompareMode(false);
        setSelected([]);
    }

    if (saved.length === 0) return null;

    return (
        <div className="retro-panel rounded-xl p-4">
            <div className="flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                <h3 className="font-bold">Saved Teams ({saved.length})</h3>
                <div className="flex gap-2 items-center">
                    {saved.length >= 2 && expanded && (
                        <button onClick={(e) => { e.stopPropagation(); setCompareMode(!compareMode); setSelected([]); }}
                                className={`text-[9px] px-2 py-0.5 font-bold ${compareMode ? 'bg-accent text-white' : 'bg-dark-600 text-gray-400 hover:text-white'}`}>
                            CMP
                        </button>
                    )}
                    <span className="text-xs text-gray-400">{expanded ? '[-]' : '[+]'}</span>
                </div>
            </div>
            {expanded && (
                <div className="space-y-2 mt-3">
                    {compareMode && (
                        <div className="text-[9px] text-accent mb-1">
                            Select 2 teams to compare ({selected.length}/2)
                            {selected.length === 2 && <button onClick={doCompare} className="ml-2 px-2 py-0.5 bg-accent text-white font-bold">Compare!</button>}
                        </div>
                    )}
                    {saved.map(s => (
                        <div key={s.id} className={`bg-dark-700 rounded-lg p-2 ${compareMode && selected.includes(s.id) ? 'border-2 border-accent' : ''}`}
                             onClick={() => compareMode && toggleSelect(s.id)}>
                            <div className="flex items-center justify-between mb-1.5">
                                <input
                                    className="text-sm font-semibold bg-transparent border-none outline-none flex-1 min-w-0 truncate"
                                    defaultValue={s.name}
                                    onBlur={e => { if (e.target.value !== s.name) renameTeam(s.id, e.target.value); }}
                                    onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
                                    style={{ padding: 0 }}
                                    onClick={e => compareMode && e.preventDefault()}
                                />
                                {!compareMode && (
                                    <div className="flex gap-1 ml-2 flex-shrink-0">
                                        <button onClick={() => onLoad(s.pokemon)}
                                                className="text-[9px] px-2 py-0.5 bg-accent2 text-white font-bold hover:bg-blue-700">
                                            LOAD
                                        </button>
                                        <button onClick={() => deleteTeam(s.id)}
                                                className="text-[9px] px-2 py-0.5 bg-red-800 text-white font-bold hover:bg-red-600">
                                            DEL
                                        </button>
                                    </div>
                                )}
                            </div>
                            <div className="flex gap-1 items-center">
                                <span className={`text-[10px] font-bold mr-1 ${s.winrate >= 70 ? 'text-green-400' : s.winrate >= 50 ? 'text-yellow-400' : 'text-red-400'}`}>
                                    {s.winrate ? s.winrate + '%' : ''}
                                </span>
                                {s.pokemon.map((p, j) => (
                                    <PokemonSprite key={j} species={p.species} size={28} />
                                ))}
                            </div>
                            <div className="text-[9px] text-gray-500 mt-1">{s.date}</div>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
}

/* ===== F3: Usage Stats Panel (right column) ===== */
function UsageStatsPanel({ format }) {
    const [usage, setUsage] = useState(null);
    const [expanded, setExpanded] = useState(null);
    const [detail, setDetail] = useState(null);

    useEffect(() => {
        fetch(`${API}/meta/${format}`).then(r => r.json()).then(d => {
            setUsage(d.top_pokemon || []);
        }).catch(() => showNotification('Failed to load metagame data', 'error'));
        setExpanded(null);
        setDetail(null);
    }, [format]);

    async function toggleSpecies(species) {
        if (expanded === species) { setExpanded(null); setDetail(null); return; }
        setExpanded(species);
        try {
            const res = await fetch(`${API}/meta/${format}/pokemon/${encodeURIComponent(species)}`);
            const data = await res.json();
            setDetail(data);
        } catch { setDetail(null); }
    }

    if (!usage || usage.length === 0) return null;
    const maxSets = usage[0]?.sets || 1;

    return (
        <div className="retro-panel rounded-xl p-4">
            <div className="retro-panel-header">Usage Stats</div>
            <div className="space-y-1">
                {usage.slice(0, 15).map((p, i) => (
                    <div key={i}>
                        <div className="flex items-center gap-2 cursor-pointer hover:bg-dark-700 p-1" onClick={() => toggleSpecies(p.species)}>
                            <PokemonSprite species={p.species} size={24} />
                            <span className="text-xs flex-1 truncate">{p.species}</span>
                            <div className="w-20 bg-dark-700 h-2">
                                <div className="h-2 bg-accent" style={{width: `${(p.sets/maxSets)*100}%`}} />
                            </div>
                            <span className="text-[9px] text-gray-500 w-8 text-right">{p.sets}</span>
                        </div>
                        {expanded === p.species && detail && (
                            <div className="bg-dark-700 p-2 ml-8 text-[9px] space-y-1 fade-in">
                                {detail.top_moves && detail.top_moves.length > 0 && (
                                    <div><span className="text-gray-500">Moves:</span> {detail.top_moves.slice(0,3).map(m => `${m.name} (${m.pct}%)`).join(', ')}</div>
                                )}
                                {detail.top_items && detail.top_items.length > 0 && (
                                    <div><span className="text-gray-500">Items:</span> {detail.top_items.slice(0,3).map(m => `${m.name} (${m.pct}%)`).join(', ')}</div>
                                )}
                                {detail.top_abilities && detail.top_abilities.length > 0 && (
                                    <div><span className="text-gray-500">Abilities:</span> {detail.top_abilities.slice(0,3).map(m => `${m.name} (${m.pct}%)`).join(', ')}</div>
                                )}
                            </div>
                        )}
                    </div>
                ))}
            </div>
        </div>
    );
}

/* ===== F6: Counter/Check Panel (right column) ===== */
function CounterPanel({ pokemon, format }) {
    const [data, setData] = useState(null);
    const [loading, setLoading] = useState(false);

    useEffect(() => {
        if (!pokemon) { setData(null); return; }
        setLoading(true);
        fetch(`${API}/team/counters`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ format_id: format, pokemon, n: 8 }),
        }).then(r => r.json()).then(d => { setData(d); setLoading(false); })
          .catch(() => { setLoading(false); showNotification('Failed to load counters', 'error'); });
    }, [pokemon?.species, format]);

    if (!pokemon) return null;
    if (loading) return <div className="retro-panel rounded-xl p-4"><div className="pokeball-spinner mx-auto" /></div>;
    if (!data) return null;

    const renderList = (items, label, color) => items && items.length > 0 ? (
        <div>
            <div className={`text-xs font-bold ${color} mb-1`}>{label}</div>
            {items.slice(0, 5).map((c, i) => (
                <div key={i} className="flex items-center gap-2 py-0.5">
                    <PokemonSprite species={c.species} size={24} />
                    <span className="text-xs flex-1 truncate">{c.species}</span>
                    <span className="text-[9px] text-gray-400">{c.best_move}</span>
                    <span className="text-[9px] text-green-400">{c.dmg_to_target}%</span>
                </div>
            ))}
        </div>
    ) : null;

    return (
        <div className="retro-panel rounded-xl p-4 fade-in">
            <div className="retro-panel-header">Counters for {pokemon.species}</div>
            <div className="space-y-3">
                {renderList(data.counters, 'Counters (safe switch-ins)', 'text-green-400')}
                {renderList(data.checks, 'Checks (force out)', 'text-yellow-400')}
                {(!data.counters?.length && !data.checks?.length) && <div className="text-xs text-gray-500">No strong counters found in pool</div>}
            </div>
        </div>
    );
}

/* ===== F2: Slot Suggestion Dropdown ===== */
function SlotSuggestionBtn({ team, slotIdx, format, onReplace }) {
    const [open, setOpen] = useState(false);
    const [suggestions, setSuggestions] = useState([]);
    const [loading, setLoading] = useState(false);

    async function loadSuggestions(e) {
        e.stopPropagation();
        if (open) { setOpen(false); return; }
        setOpen(true);
        setLoading(true);
        try {
            const res = await fetch(`${API}/team/suggest-slot`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ format_id: format, team: team.filter(Boolean), slot_idx: slotIdx }),
            });
            const data = await res.json();
            setSuggestions(data.suggestions || []);
        } catch { setSuggestions([]); }
        setLoading(false);
    }

    return (
        <div className="relative" style={{zIndex: 20}}>
            <button onClick={loadSuggestions}
                    className="text-[8px] px-1.5 py-0.5 bg-accent2 text-white font-bold opacity-0 group-hover:opacity-100 hover:bg-blue-700"
                    title="Suggest replacements">
                ?
            </button>
            {open && (
                <div className="absolute top-6 right-0 w-56 bg-dark-800 border-2 border-dark-600 p-2 shadow-lg" style={{zIndex: 30}}>
                    <div className="text-[9px] text-gray-500 mb-1">Suggested replacements:</div>
                    {loading ? <div className="pokeball-spinner mx-auto" /> :
                        suggestions.length === 0 ? <div className="text-[9px] text-gray-500">No suggestions</div> :
                        suggestions.map((s, i) => (
                            <div key={i} className="flex items-center gap-1.5 py-0.5 cursor-pointer hover:bg-dark-700 px-1"
                                 onClick={(e) => { e.stopPropagation(); onReplace(s); setOpen(false); }}>
                                <PokemonSprite species={s.species} size={20} />
                                <span className="text-[9px] flex-1 truncate">{s.species}</span>
                                <span className={`text-[9px] font-bold ${s.delta > 0 ? 'text-green-400' : s.delta < 0 ? 'text-red-400' : 'text-gray-400'}`}>
                                    {s.delta > 0 ? '+' : ''}{(s.delta*100).toFixed(1)}%
                                </span>
                            </div>
                        ))
                    }
                    <button onClick={(e) => { e.stopPropagation(); setOpen(false); }} className="text-[8px] text-gray-500 mt-1 w-full text-center">close</button>
                </div>
            )}
        </div>
    );
}

/* ===== F1: Head-to-Head Page ===== */
function HeadToHeadPage({ format, myTeam }) {
    const [team2Paste, setTeam2Paste] = useState('');
    const [team2, setTeam2] = useState([]);
    const [result, setResult] = useState(null);
    const [loading, setLoading] = useState(false);

    async function importOpponent() {
        try {
            const res = await fetch(`${API}/team/import`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ format_id: format, paste: team2Paste }),
            });
            const data = await res.json();
            if (data.team) setTeam2(data.team);
        } catch {}
    }

    async function runH2H() {
        const t1 = myTeam.filter(Boolean);
        if (t1.length === 0 || team2.length === 0) return;
        setLoading(true);
        try {
            const res = await fetch(`${API}/team/head-to-head`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ format_id: format, team1: t1, team2 }),
            });
            setResult(await res.json());
        } catch {}
        setLoading(false);
    }

    const t1 = myTeam.filter(Boolean);
    const cellColor = (dmg) => dmg >= 100 ? 'bg-green-600/40' : dmg >= 50 ? 'bg-green-500/20' : dmg >= 25 ? 'bg-yellow-500/15' : 'bg-red-500/15';

    return (
        <div className="space-y-4 fade-in">
            <div className="grid grid-cols-2 gap-4">
                {/* Your Team */}
                <div className="retro-panel rounded-xl p-4">
                    <div className="retro-panel-header">Your Team</div>
                    {t1.length === 0 ? <div className="text-xs text-gray-500">Build a team first</div> :
                        <div className="flex gap-1 flex-wrap">
                            {t1.map((p, i) => <div key={i} className="flex flex-col items-center">
                                <PokemonSprite species={p.species} size={36} />
                                <span className="text-[8px] text-gray-400 truncate w-12 text-center">{p.species}</span>
                            </div>)}
                        </div>
                    }
                </div>
                {/* Opponent Team */}
                <div className="retro-panel rounded-xl p-4">
                    <div className="retro-panel-header">Opponent Team</div>
                    {team2.length > 0 ? (
                        <div className="flex gap-1 flex-wrap">
                            {team2.map((p, i) => <div key={i} className="flex flex-col items-center">
                                <PokemonSprite species={p.species} size={36} />
                                <span className="text-[8px] text-gray-400 truncate w-12 text-center">{p.species}</span>
                            </div>)}
                        </div>
                    ) : (
                        <div>
                            <textarea value={team2Paste} onChange={e => setTeam2Paste(e.target.value)}
                                      placeholder="Paste opponent's team..." className="w-full bg-dark-700 p-2 text-xs h-24 resize-none mb-2" />
                            <button onClick={importOpponent} className="w-full bg-accent2 text-white py-1 text-xs font-bold">Import Opponent</button>
                        </div>
                    )}
                    {team2.length > 0 && <button onClick={() => setTeam2([])} className="text-[9px] text-gray-500 mt-1">Clear</button>}
                </div>
            </div>

            <button onClick={runH2H} disabled={loading || t1.length === 0 || team2.length === 0}
                    className="w-full bg-accent hover:bg-red-700 disabled:bg-gray-600 text-white font-bold py-2 text-sm">
                {loading ? 'Analyzing...' : 'Run Head-to-Head'}
            </button>

            {result && (
                <div className="space-y-4 fade-in">
                    {/* Win Probability */}
                    {result.win_probability && (
                        <div className="retro-panel rounded-xl p-4 text-center">
                            <div className="text-lg font-bold">
                                <span className={result.win_probability.team1_win_prob >= 50 ? 'text-green-400' : 'text-red-400'}>
                                    {result.win_probability.team1_win_prob}%
                                </span>
                                <span className="text-gray-500 mx-3">vs</span>
                                <span className={result.win_probability.team2_win_prob >= 50 ? 'text-green-400' : 'text-red-400'}>
                                    {result.win_probability.team2_win_prob}%
                                </span>
                            </div>
                            <div className="w-full bg-dark-700 h-4 mt-2">
                                <div className="h-4 bg-accent2" style={{width: `${result.win_probability.team1_win_prob}%`}} />
                            </div>
                        </div>
                    )}

                    {/* 6x6 Matchup Grid */}
                    {result.matchup_matrix && result.matchup_matrix.length > 0 && (
                        <div className="retro-panel rounded-xl p-4 overflow-x-auto">
                            <div className="retro-panel-header">Matchup Matrix (Your ATK dmg%)</div>
                            <table className="w-full text-center text-[9px]">
                                <thead>
                                    <tr>
                                        <th className="p-1"></th>
                                        {team2.map((p, j) => <th key={j} className="p-1"><PokemonSprite species={p.species} size={28} /><div className="truncate w-14">{p.species}</div></th>)}
                                    </tr>
                                </thead>
                                <tbody>
                                    {t1.map((atk, i) => (
                                        <tr key={i}>
                                            <td className="p-1"><PokemonSprite species={atk.species} size={28} /><div className="truncate w-14">{atk.species}</div></td>
                                            {team2.map((def_, j) => {
                                                const cell = result.matchup_matrix.find(m => m.atk === atk.species && m.def_ === def_.species);
                                                const dmg = cell ? cell.atk_dmg : 0;
                                                return <td key={j} className={`p-1 ${cellColor(dmg)}`} title={cell ? `${cell.atk_move}: ${dmg}%` : ''}>
                                                    <div className="font-bold">{dmg}%</div>
                                                    <div className="text-gray-500 truncate">{cell?.atk_move || ''}</div>
                                                </td>;
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            )}
        </div>
    );
}

/* ===== F5: Damage Calculator Page ===== */
function DamageCalcPage({ format, myTeam }) {
    const [attacker, setAttacker] = useState(null);
    const [defender, setDefender] = useState(null);
    const [defSearch, setDefSearch] = useState('');
    const [defResults, setDefResults] = useState([]);
    const [selectedMove, setSelectedMove] = useState('');
    const [result, setResult] = useState(null);

    const searchTimeout = useRef(null);
    function searchDefender(q) {
        setDefSearch(q);
        clearTimeout(searchTimeout.current);
        if (q.length < 2) { setDefResults([]); return; }
        searchTimeout.current = setTimeout(async () => {
            const res = await fetch(`${API}/pokemon/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            setDefResults(data.results || []);
        }, 300);
    }

    async function calculate() {
        if (!attacker || !defender || !selectedMove) return;
        try {
            const res = await fetch(`${API}/battle/damage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ format_id: format, attacker, defender, move: selectedMove }),
            });
            setResult(await res.json());
        } catch {}
    }

    useEffect(() => { if (attacker && defender && selectedMove) calculate(); }, [attacker, defender, selectedMove]);

    const t = myTeam.filter(Boolean);
    const effColors = { super: 'text-green-400', double_super: 'text-green-300', resist: 'text-red-400', double_resist: 'text-red-300', immune: 'text-gray-500', neutral: 'text-gray-300' };
    const effLabels = { super: 'Super effective!', double_super: '4x Super effective!', resist: 'Not very effective', double_resist: '4x Resisted', immune: 'No effect', neutral: 'Neutral' };

    return (
        <div className="space-y-4 fade-in">
            <div className="grid grid-cols-3 gap-4">
                {/* Attacker */}
                <div className="retro-panel rounded-xl p-4">
                    <div className="retro-panel-header">Attacker</div>
                    {t.length > 0 && <div className="text-[9px] text-gray-500 mb-2">Pick from your team:</div>}
                    <div className="flex gap-1 flex-wrap mb-2">
                        {t.map((p, i) => (
                            <div key={i} onClick={() => { setAttacker(p); setSelectedMove(''); setResult(null); }}
                                 className={`cursor-pointer p-1 ${attacker?.species === p.species ? 'bg-accent/30 border border-accent' : 'hover:bg-dark-700'}`}>
                                <PokemonSprite species={p.species} size={36} />
                            </div>
                        ))}
                    </div>
                    {attacker && (
                        <div className="bg-dark-700 p-2">
                            <div className="font-bold text-sm">{attacker.species}</div>
                            {attacker.item && <div className="text-[9px] text-gray-400">@ {attacker.item}</div>}
                            {attacker.ability && <div className="text-[9px] text-gray-400">{attacker.ability}</div>}
                        </div>
                    )}
                </div>
                {/* Move Selector + Result */}
                <div className="retro-panel rounded-xl p-4">
                    <div className="retro-panel-header">Move</div>
                    {attacker && attacker.moves && attacker.moves.length > 0 ? (
                        <div className="space-y-1 mb-3">
                            {attacker.moves.filter(Boolean).map((m, i) => (
                                <button key={i} onClick={() => setSelectedMove(m)}
                                        className={`w-full text-left px-2 py-1.5 text-xs ${selectedMove === m ? 'bg-accent text-white font-bold' : 'bg-dark-700 hover:bg-dark-600 text-gray-300'}`}>
                                    {m}
                                </button>
                            ))}
                        </div>
                    ) : <div className="text-xs text-gray-500">Select an attacker first</div>}

                    {result && (
                        <div className="mt-3 text-center fade-in">
                            <div className="text-3xl font-bold text-white">{result.damage_pct}%</div>
                            <div className="text-xs text-gray-400 mt-1">{result.min_roll}% - {result.max_roll}%</div>
                            <div className={`text-sm font-bold mt-2 ${effColors[result.effectiveness] || 'text-gray-300'}`}>
                                {effLabels[result.effectiveness] || result.effectiveness}
                            </div>
                            <div className="mt-2">
                                {result.is_ohko ? <span className="text-xs px-2 py-0.5 bg-green-600 text-white font-bold">OHKO</span>
                                    : result.is_2hko ? <span className="text-xs px-2 py-0.5 bg-yellow-600 text-white font-bold">2HKO</span>
                                    : <span className="text-xs px-2 py-0.5 bg-red-800 text-white font-bold">3HKO+</span>}
                            </div>
                            {/* HP bar */}
                            <div className="w-full bg-dark-700 h-4 mt-3 relative">
                                <div className="h-4 bg-green-500" style={{width: `${Math.max(0, 100 - result.damage_pct)}%`}} />
                                <div className="absolute inset-0 flex items-center justify-center text-[9px] font-bold text-white">
                                    {Math.max(0, 100 - result.damage_pct).toFixed(0)}% HP remaining
                                </div>
                            </div>
                        </div>
                    )}
                </div>
                {/* Defender */}
                <div className="retro-panel rounded-xl p-4">
                    <div className="retro-panel-header">Defender</div>
                    <input type="text" value={defSearch} onChange={e => searchDefender(e.target.value)}
                           placeholder="Search defender..." className="w-full bg-dark-700 px-2 py-1 text-xs mb-2" />
                    {defResults.length > 0 && !defender && (
                        <div className="space-y-1 max-h-48 overflow-y-auto">
                            {defResults.slice(0, 8).map((p, i) => (
                                <div key={i} onClick={() => { setDefender(p); setDefResults([]); setDefSearch(p.name || p.species); }}
                                     className="flex items-center gap-2 p-1 cursor-pointer hover:bg-dark-700">
                                    <PokemonSprite species={p.name || p.id} size={24} />
                                    <span className="text-xs">{p.name || p.id}</span>
                                </div>
                            ))}
                        </div>
                    )}
                    {defender && (
                        <div className="bg-dark-700 p-2">
                            <div className="flex items-center gap-2">
                                <PokemonSprite species={defender.species || defender.name || defender.id} size={48} />
                                <div>
                                    <div className="font-bold text-sm">{defender.species || defender.name || defender.id}</div>
                                    <div className="flex gap-1 mt-0.5">
                                        {(defender.types || []).map(t => <TypeBadge key={t} type={t} />)}
                                    </div>
                                </div>
                            </div>
                            <button onClick={() => { setDefender(null); setDefSearch(''); setResult(null); }} className="text-[9px] text-gray-500 mt-1">Change</button>
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
}

                                ) : <span className="text-green-400">Full coverage</span>}
                            </div>

                        {/* Shared / Unique */}
                        <div className="text-xs">

}

/* ===== F9: Tier List Page ===== */
function TierListPage({ format, onNavigateFormat }) {
    const [data, setData] = useState(null);
    const [loading, setLoading] = useState(true);
    const [sortBy, setSortBy] = useState('total');

    useEffect(() => {
        fetch(`${API}/formats/tier-list`).then(r => r.json()).then(d => { setData(d); setLoading(false); })
            .catch(() => { setLoading(false); showNotification('Failed to load tier list', 'error'); });
    }, []);

    if (loading) return <div className="flex items-center justify-center py-20"><div className="pokeball-spinner" /></div>;
    if (!data || !data.pokemon?.length) return <div className="text-center text-gray-400 py-10">No tier list data</div>;

    const fmts = data.formats || [];
    const pokemon = [...data.pokemon].sort((a, b) => {
        if (sortBy === 'total') return b.total_usage - a.total_usage;
        return (b.usage[sortBy] || 0) - (a.usage[sortBy] || 0);
    });

    const maxUsage = Math.max(...pokemon.flatMap(p => Object.values(p.usage)));

    return (
        <div className="space-y-4 fade-in">
            <div className="retro-panel rounded-xl p-4">
                <div className="retro-panel-header">Cross-Format Tier List</div>
                <div className="text-xs text-gray-500 mb-2">Click a cell to navigate to that format. Click column headers to sort.</div>
                <div className="overflow-x-auto">
                    <table className="w-full text-[9px]" style={{tableLayout: 'fixed'}}>
                        <thead>
                            <tr>
                                <th className="p-1 text-left sticky left-0 bg-dark-800 cursor-pointer" onClick={() => setSortBy('total')}>
                                    Pokemon {sortBy === 'total' && '\u25BC'}
                                </th>
                                {fmts.map(f => (
                                    <th key={f} className="p-1 cursor-pointer hover:text-accent writing-mode-vertical" style={{writingMode:'vertical-rl', maxWidth: 30}}
                                        onClick={() => setSortBy(f)}>
                                        {prettyName(f)} {sortBy === f && '\u25BC'}
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {pokemon.map((p, i) => (
                                <tr key={i} className="hover:bg-dark-700" style={{height: '28px'}}>
                                    <td className="p-1 sticky left-0 bg-dark-800">
                                        <div className="flex items-center gap-1" style={{height: '20px'}}>
                                            <PokemonSprite species={p.species} size={20} />
                                            <span className="truncate">{p.species}</span>
                                        </div>
                                    </td>
                                    {fmts.map(f => {
                                        const val = p.usage[f] || 0;
                                        const intensity = val > 0 ? Math.min(val / maxUsage, 1) : 0;
                                        const bg = val > 0
                                            ? `rgba(${Math.round(230 * intensity)}, ${Math.round(57 * intensity + 80 * (1-intensity))}, ${Math.round(70 * (1-intensity) + 70 * intensity)}, ${0.2 + intensity * 0.6})`
                                            : 'transparent';
                                        return (
                                            <td key={f} className="p-1 text-center cursor-pointer" style={{background: bg}}
                                                onClick={() => onNavigateFormat && onNavigateFormat(f)}>
                                                {val > 0 ? (val * 100).toFixed(1) : ''}
                                            </td>
                                        );
                                    })}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    );
}

function prettyName(fmtId) {
    const m = fmtId.match(/^gen(\d+)(.*)/);
    if (!m) return fmtId;
    const tier = m[2];
    const special = {
        'ou': 'OU', 'uu': 'UU', 'ru': 'RU', 'nu': 'NU', 'pu': 'PU',
        'ubers': 'Ubers', 'doublesou': 'Doubles OU', 'lc': 'LC',
        'monotype': 'Monotype', 'nationaldex': 'National Dex',
        'nationaldexou': 'National Dex OU', 'nationaldexubers': 'National Dex Ubers',
        'randombattle': 'Random Battle', 'anythinggoes': 'Anything Goes',
        'cap': 'CAP', 'zu': 'ZU', 'nfe': 'NFE', 'battlestadiumsingles': 'BSS',
        'battlestadiumdoubles': 'BSD', '1v1': '1v1', '2v2doubles': '2v2',
        'almostanyability': 'AAA', 'balancedhackmons': 'BH',
        'mixandmega': 'Mix and Mega', 'stabmons': 'STABmons',
    };
    if (special[tier]) return special[tier];
    // VGC: gen9vgc2026regf -> VGC 2026 Reg F
    const vgcMatch = tier.match(/^vgc(\d+)reg([a-z])$/);
    if (vgcMatch) return `VGC ${vgcMatch[1]} Reg ${vgcMatch[2].toUpperCase()}`;
    const vgcMatch2 = tier.match(/^vgc(\d+)$/);
    if (vgcMatch2) return `VGC ${vgcMatch2[1]}`;
    return tier.toUpperCase();
}

function App() {
    const [page, setPage] = useState('builder');
    const [format, setFormat] = useState('gen9ou');
    const [formats, setFormats] = useState([]);
    const [team, setTeam] = useState([null, null, null, null, null, null]);
    const [generatedTeams, setGeneratedTeams] = useState([]);
    const [searchQuery, setSearchQuery] = useState('');
    const [searchResults, setSearchResults] = useState([]);
    const [searching, setSearching] = useState(false);
    const [autoAnalyze, setAutoAnalyze] = useState(false);
    const [notification, setNotification] = useState(null);
    const [selectedSlot, setSelectedSlot] = useState(null);
    const [compareTeams, setCompareTeams] = useState(null);
    const [showPrivacy, setShowPrivacy] = useState(false);
    const [showOnboarding, setShowOnboarding] = useState(() => {
        return !localStorage.getItem('fsml_onboarded');
    });
    const [darkMode, setDarkMode] = useState(() => {
        const saved = localStorage.getItem('retro-dark-mode');
        return saved !== null ? saved === 'true' : true;
    });

    const gen = parseInt((format || '').match(/gen(\d)/)?.[1] || '9');

    useEffect(() => {
        document.documentElement.classList.toggle('dark', darkMode);
        localStorage.setItem('retro-dark-mode', String(darkMode));
    }, [darkMode]);

    useEffect(() => {
        fetch(`${API}/formats`).then(r => r.json()).then(d => setFormats(d.formats || []))
            .catch(() => showNotification('Server not responding — is the backend running?', 'error'));
    }, []);

    // F4: URL hash team sharing — decode on load
    useEffect(() => {
        try {
            const hash = window.location.hash;
            if (hash && hash.includes('team=')) {
                const params = new URLSearchParams(hash.slice(1));
                const b64 = params.get('team');
                const fmt = params.get('fmt');
                if (b64) {
                    const decoded = atob(b64);
                    const mons = decoded.split('||').map(block => {
                        const [species, item, ability, nature, movesStr, evsStr] = block.split('|');
                        const moves = movesStr ? movesStr.split(',') : [];
                        const evObj = {};
                        if (evsStr) {
                            const evParts = evsStr.split('.');
                            const evNames = ['hp','atk','def','spa','spd','spe'];
                            evParts.forEach((v, i) => { if (+v > 0 && evNames[i]) evObj[evNames[i]] = +v; });
                        }
                        return { species: species || '', item: item || '', ability: ability || '', nature: nature || '', moves, evs: evObj };
                    });
                    const newTeam = mons.slice(0, 6);
                    while (newTeam.length < 6) newTeam.push(null);
                    setTeam(newTeam);
                    if (fmt) setFormat(fmt);
                    window.location.hash = '';
                }
            }
        } catch {}
    }, []);

    const searchTimeout = useRef(null);
    function handleSearch(q) {
        setSearchQuery(q);
        clearTimeout(searchTimeout.current);
        if (q.length < 2) { setSearchResults([]); return; }
        searchTimeout.current = setTimeout(async () => {
            setSearching(true);
            try {
                const res = await fetch(`${API}/pokemon/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                setSearchResults(data.results || []);
            } catch (e) { console.error(e); }
            setSearching(false);
        }, 300);
    }

    function addToTeam(pokemon) {
        const p = { ...pokemon, species: pokemon.species || pokemon.name || pokemon.id };
        setTeam(prev => {
            const next = [...prev];
            const emptyIdx = next.findIndex(s => s === null);
            if (emptyIdx >= 0) next[emptyIdx] = p;
            return next;
        });
    }

    function removeFromTeam(idx) {
        setTeam(prev => { const next = [...prev]; next[idx] = null; return next; });
        if (selectedSlot === idx) setSelectedSlot(null);
    }

    function handleTeamsGenerated(teams) {
        setGeneratedTeams(teams);
    }

    function selectGeneratedTeam(pokemon) {
        const newTeam = [...pokemon.slice(0, 6)];
        while (newTeam.length < 6) newTeam.push(null);
        setTeam(newTeam);
        setAutoAnalyze(true);
    }

    function handleImport(importedTeam) {
        const newTeam = importedTeam.slice(0, 6);
        while (newTeam.length < 6) newTeam.push(null);
        setTeam(newTeam);
    }

    function handleAnalysisResult(data) {
        setAutoAnalyze(false);
    }

    // F2: Slot replacement handler
    function handleSlotReplace(slotIdx, suggestion) {
        setTeam(prev => {
            const next = [...prev];
            next[slotIdx] = { species: suggestion.species, moves: [], ability: '', item: '' };
            return next;
        });
    }

    // F4: Share team via URL
    function shareTeam() {
        const filled = team.filter(Boolean);
        if (filled.length === 0) return;
        const encoded = filled.map(p => {
            const evStr = p.evs ? ['hp','atk','def','spa','spd','spe'].map(s => p.evs[s] || 0).join('.') : '';
            return [p.species || '', p.item || '', p.ability || '', p.nature || '', (p.moves || []).join(','), evStr].join('|');
        }).join('||');
        const b64 = btoa(encoded);
        const url = `${window.location.origin}${window.location.pathname}#team=${b64}&fmt=${format}`;
        navigator.clipboard.writeText(url).then(() => showNotification('Share URL copied!', 'success'))
            .catch(() => showNotification('Failed to copy', 'error'));
    }

    const [savedVersion, setSavedVersion] = useState(0);
    const [lastWinrate, setLastWinrate] = useState(null);

    function saveCurrentTeam() {
        const filled = team.filter(Boolean);
        if (filled.length === 0) return;
        try {
            const all = JSON.parse(localStorage.getItem('fsml-saved-teams') || '[]');
            const species = filled.map(p => p.species);
            const entry = {
                id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                format: format,
                name: species.slice(0, 3).join(' / '),
                pokemon: filled,
                winrate: lastWinrate,
                date: new Date().toLocaleDateString(),
            };
            all.unshift(entry);
            localStorage.setItem('fsml-saved-teams', JSON.stringify(all));
            showNotification('Team saved!', 'success');
            setSavedVersion(v => v + 1);
        } catch (e) {
            showNotification('Failed to save: ' + e.message, 'error');
        }
    }

    function loadSavedTeam(pokemon) {
        const newTeam = [...pokemon.slice(0, 6)];
        while (newTeam.length < 6) newTeam.push(null);
        setTeam(newTeam);
    }

    function handleMetaLoadTeam(teamData) {
        const newTeam = teamData.slice(0, 6);
        while (newTeam.length < 6) newTeam.push(null);
        setTeam(newTeam);
        setPage('builder');
    }

    function showNotification(msg, type = 'error') {
        setNotification({ msg, type });
        setTimeout(() => setNotification(null), 5000);
    }

    const filledTeam = team.filter(Boolean);

                    <div className="retro-panel p-6 max-w-md w-full mx-4 fade-in">
                        <div className="retro-panel-header text-center text-sm">Welcome to FutureSightML</div>
                        <p className="text-center mb-4 mt-2" style={{fontSize:'9px',lineHeight:'1.8'}}>
                            ML-powered Pokemon team builder that predicts win rates before a battle begins.

                            <div className="flex items-start gap-3 p-2 bg-dark-700">
                                <span className="text-accent font-bold text-lg mt-0.5">1</span>
                                <div><span className="font-bold">Pick a format</span><br/>Choose from 129 formats across Gens 1-9</div>
                            </div>
                            <div className="flex items-start gap-3 p-2 bg-dark-700">
                                <span className="text-accent font-bold text-lg mt-0.5">2</span>
                                <div><span className="font-bold">Build your team</span><br/>Generate with AI, import, or add Pokemon manually</div>
                            </div>
                            <div className="flex items-start gap-3 p-2 bg-dark-700">
                                <span className="text-accent font-bold text-lg mt-0.5">3</span>
                                <div><span className="font-bold">See predictions</span><br/>Get win rates, matchup analysis, and optimization tips</div>
                            </div>
                        </div>
                        <button onClick={dismissOnboarding}
                            className="w-full bg-accent hover:bg-red-700 text-white font-bold py-2 text-sm">
                            Got it!
                        </button>
                    </div>

            <header className="retro-panel sticky top-0 z-50">

            {showPrivacy && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center" style={{background:'rgba(0,0,0,0.75)'}} onClick={() => setShowPrivacy(false)}>
                    <div className="retro-panel p-6 max-w-lg w-full mx-4 max-h-[70vh] overflow-y-auto fade-in" onClick={e => e.stopPropagation()}>
                        <div className="retro-panel-header flex items-center justify-between">
                            <span>Privacy</span>
                            <button onClick={() => setShowPrivacy(false)} className="text-white hover:text-accent bg-transparent border-none cursor-pointer">X</button>
                        </div>
                        <div className="space-y-3 mt-2" style={{fontSize:'9px',lineHeight:'1.8'}}>
                            <p className="font-bold">FutureSightML is fully local.</p>
                            <p><span className="text-accent">All ML inference runs on your machine.</span> No team data is sent to any external server.</p>
                            <p>Your SQLite database of replays stays in your local data/ directory and is never uploaded.</p>
                            <p>No accounts, no analytics, no telemetry.</p>
                            <p className="font-bold mt-3">What accesses the internet:</p>
                            <p>Replay scraping fetches public data from the Pokemon Showdown replay API. Sprites load from play.pokemonshowdown.com. No user data is sent.</p>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
