scraper:
  replay_base_url: "https://replay.pokemonshowdown.com"
  stats_base_url: "https://www.smogon.com/stats"
  showdown_data_url: "https://raw.githubusercontent.com/smogon/pokemon-showdown/master/data"
  max_concurrent_requests: 10
  request_delay_ms: 100
  min_rating: 1100
  max_pages_per_format: 1500

formats:
  singles:
    - gen9ou
    - gen9uu
    - gen9ru
    - gen9nu
    - gen9ubers
  doubles:
    - gen9vgc2026regf
    - gen9doublesou

database:
  path: "data/replays.db"

training:
  batch_size: 256
  learning_rate: 0.001
  epochs: 100
  patience: 20
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  min_rating_filter: 1200
  max_replay_age_days: 90
  checkpoint_dir: "data/checkpoints"

model:
  pokemon_embed_dim: 64
  move_embed_dim: 32
  item_embed_dim: 32
  ability_embed_dim: 32
  pokemon_hidden_dim: 128
  team_hidden_dim: 256
  attention_heads: 4
  dropout: 0.35
  continuous_dim: 64
  transformer_layers: 3
  use_cross_attention: true
  rating_dim: 6

xgboost:
  n_estimators: 3000
  max_depth: 3
  learning_rate: 0.02
  subsample: 0.7
  colsample_bytree: 0.3
  colsample_bylevel: 0.7
  min_child_weight: 10
  gamma: 0.3
  reg_alpha: 2.0
  reg_lambda: 5.0
  early_stopping_rounds: 80

teambuilder:
  population_size: 200
  generations: 500
  mutation_rate: 0.15
  crossover_rate: 0.7
  elite_size: 20
  tournament_size: 5
  meta_sample_size: 50
